<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>都道府県別 疾病ランキング</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2236;
    --border: #1e293b;
    --text: #e2e8f0;
    --text-dim: #94a3b8;
    --text-muted: #64748b;
    --accent: #38bdf8;
    --accent2: #818cf8;
    --accent3: #f472b6;
    --gold: #fbbf24;
    --silver: #cbd5e1;
    --bronze: #d97706;
    --bar-male: #60a5fa;
    --bar-female: #f472b6;
    --bar-total: #38bdf8;
    --green: #34d399;
    --red: #fb7185;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  .noise {
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  .glow-orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.08;
    pointer-events: none;
    z-index: 0;
  }
  .glow-orb.blue { width: 600px; height: 600px; background: #38bdf8; top: -200px; right: -100px; }
  .glow-orb.purple { width: 500px; height: 500px; background: #818cf8; bottom: -100px; left: -100px; }

  .app {
    position: relative;
    z-index: 1;
    max-width: 1200px;
    margin: 0 auto;
    padding: 24px 20px 60px;
  }

  header {
    text-align: center;
    margin-bottom: 40px;
    padding-top: 20px;
  }

  header .tag {
    display: inline-block;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    background: rgba(56, 189, 248, 0.1);
    border: 1px solid rgba(56, 189, 248, 0.2);
    padding: 5px 16px;
    border-radius: 100px;
    margin-bottom: 16px;
  }

  header h1 {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-weight: 900;
    font-size: clamp(28px, 5vw, 48px);
    letter-spacing: -1px;
    background: linear-gradient(135deg, #e2e8f0 0%, #38bdf8 50%, #818cf8 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.2;
  }

  header p {
    color: var(--text-dim);
    font-size: 14px;
    margin-top: 8px;
    font-weight: 300;
  }

  /* Controls */
  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 32px;
    align-items: stretch;
  }

  .control-group {
    flex: 1;
    min-width: 220px;
  }

  .control-group label {
    display: block;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 6px;
  }

  .select-wrap {
    position: relative;
  }

  .select-wrap select {
    width: 100%;
    appearance: none;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    padding: 12px 40px 12px 16px;
    border-radius: 12px;
    cursor: pointer;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .select-wrap select:hover { border-color: var(--accent); }
  .select-wrap select:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(56,189,248,0.15);
  }

  .select-wrap::after {
    content: '▾';
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 14px;
    pointer-events: none;
  }

  .gender-pills {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    height: 100%;
    min-height: 44px;
  }

  .gender-pills button {
    flex: 1;
    background: none;
    border: none;
    color: var(--text-muted);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 10px 16px;
    cursor: pointer;
    transition: all 0.25s;
    position: relative;
  }

  .gender-pills button.active {
    color: var(--bg);
    background: var(--accent);
  }

  .gender-pills button:not(.active):hover {
    color: var(--text);
    background: rgba(255,255,255,0.05);
  }

  /* Stats cards */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 12px;
    margin-bottom: 32px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    position: relative;
    overflow: hidden;
  }

  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }

  .stat-card .label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 6px;
  }

  .stat-card .value {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 28px;
    font-weight: 900;
    color: var(--text);
  }

  .stat-card .unit {
    font-size: 14px;
    font-weight: 400;
    color: var(--text-dim);
    margin-left: 4px;
  }

  .stat-card .sub {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  /* Ranking table */
  .ranking-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
  }

  .ranking-header {
    padding: 24px 28px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
  }

  .ranking-header h2 {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
  }

  .ranking-header .info {
    font-size: 12px;
    color: var(--text-muted);
  }

  .ranking-list {
    padding: 8px 0;
  }

  .rank-item {
    display: grid;
    grid-template-columns: 50px 1fr 120px;
    align-items: center;
    padding: 14px 28px;
    transition: background 0.15s;
    border-bottom: 1px solid rgba(30, 41, 59, 0.5);
  }

  .rank-item:last-child { border-bottom: none; }
  .rank-item:hover { background: rgba(56, 189, 248, 0.03); }

  .rank-num {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 18px;
    font-weight: 900;
    color: var(--text-muted);
    text-align: center;
  }

  .rank-item:nth-child(1) .rank-num { color: var(--gold); font-size: 22px; }
  .rank-item:nth-child(2) .rank-num { color: var(--silver); font-size: 20px; }
  .rank-item:nth-child(3) .rank-num { color: var(--bronze); font-size: 20px; }

  .rank-info {
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 0 16px;
  }

  .rank-name {
    font-weight: 700;
    font-size: 15px;
  }

  .rank-item:nth-child(1) .rank-name { color: var(--gold); }
  .rank-item:nth-child(2) .rank-name { color: var(--silver); }
  .rank-item:nth-child(3) .rank-name { color: var(--bronze); }

  .rank-bar-wrap {
    width: 100%;
    height: 8px;
    background: rgba(255,255,255,0.04);
    border-radius: 100px;
    overflow: hidden;
  }

  .rank-bar {
    height: 100%;
    border-radius: 100px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .rank-item:nth-child(1) .rank-bar { background: linear-gradient(90deg, var(--gold), #f59e0b); }
  .rank-item:nth-child(2) .rank-bar { background: linear-gradient(90deg, var(--silver), #94a3b8); }
  .rank-item:nth-child(3) .rank-bar { background: linear-gradient(90deg, var(--bronze), #b45309); }

  .rank-value {
    text-align: right;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-weight: 700;
    font-size: 16px;
    white-space: nowrap;
  }

  .rank-value .unit {
    font-size: 11px;
    font-weight: 400;
    color: var(--text-muted);
    margin-left: 2px;
  }

  .gender-breakdown {
    display: flex;
    gap: 12px;
    font-size: 11px;
    color: var(--text-muted);
  }

  .gender-breakdown .male { color: var(--bar-male); }
  .gender-breakdown .female { color: var(--bar-female); }

  /* Search */
  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 220px;
  }

  .search-wrap input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    padding: 12px 16px 12px 40px;
    border-radius: 12px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .search-wrap input::placeholder { color: var(--text-muted); }
  .search-wrap input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(56,189,248,0.15);
  }

  .search-wrap .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 14px;
    pointer-events: none;
  }

  /* Footer */
  .footer {
    text-align: center;
    color: var(--text-muted);
    font-size: 11px;
    margin-top: 40px;
    padding: 20px;
    border-top: 1px solid var(--border);
  }

  @media (max-width: 640px) {
    .app { padding: 16px 12px 40px; }
    .rank-item { grid-template-columns: 40px 1fr 80px; padding: 12px 16px; }
    .rank-value { font-size: 13px; }
    .ranking-header { padding: 16px 16px 12px; }
    .stats-row { grid-template-columns: 1fr 1fr; }
    .stat-card .value { font-size: 22px; }
  }
</style>
</head>

  const [searchQuery, setSearchQuery] = React.useState('');

  const disease = DATA[selectedDisease];

  const getValue = (p) => {
    if (gender === 'male') return p[2];
    if (gender === 'female') return p[3];
    return p[1];
  };

  const ranked = [...disease.p]
    .map(p => ({ name: p[0], total: p[1], male: p[2], female: p[3], value: getValue(p) }))
    .sort((a, b) => b.value - a.value);

  const maxValue = ranked.length > 0 ? ranked[0].value : 1;

  const filtered = searchQuery
    ? ranked.filter(r => r.name.includes(searchQuery))
    : ranked;

  const nationalValue = gender === 'male' ? disease.m : gender === 'female' ? disease.f : disease.t;
  const maleRatio = disease.t > 0 ? ((disease.m / disease.t) * 100).toFixed(1) : 0;
  const femaleRatio = disease.t > 0 ? ((disease.f / disease.t) * 100).toFixed(1) : 0;

  const genderLabel = gender === 'male' ? '男性' : gender === 'female' ? '女性' : '総数';

  return React.createElement('div', null,
    // Header
    React.createElement('header', null,
      React.createElement('div', { className: 'tag' }, '2022年 国民生活基礎調査'),
      React.createElement('h1', null, '都道府県別 疾病ランキング'),
      React.createElement('p', null, '通院者数による都道府県ランキング（単位：千人）')
    ),

    // Controls
    React.createElement('div', { className: 'controls' },
      React.createElement('div', { className: 'control-group', style: { flex: 2 } },
        React.createElement('label', null, '疾病を選択'),
        React.createElement('div', { className: 'select-wrap' },
          React.createElement('select', {
            value: selectedDisease,
            onChange: e => setSelectedDisease(Number(e.target.value))
          },
            DATA.map((d, i) => React.createElement('option', { key: i, value: i }, d.n))
          )
        )
      ),
      React.createElement('div', { className: 'control-group', style: { flex: 1 } },
        React.createElement('label', null, '性別'),
        React.createElement('div', { className: 'gender-pills' },
          ['total', 'male', 'female'].map(g =>
            React.createElement('button', {
              key: g,
              className: gender === g ? 'active' : '',
              onClick: () => setGender(g)
            }, g === 'total' ? '総数' : g === 'male' ? '男性' : '女性')
          )
        )
      )
    ),

    // Stats cards
    React.createElement('div', { className: 'stats-row' },
      React.createElement('div', { className: 'stat-card' },
        React.createElement('div', { className: 'label' }, '全国' + genderLabel),
        React.createElement('div', { className: 'value' },
          nationalValue.toLocaleString(),
          React.createElement('span', { className: 'unit' }, '千人')
        )
      ),
      React.createElement('div', { className: 'stat-card' },
        React.createElement('div', { className: 'label' }, '1位'),
        React.createElement('div', { className: 'value', style: { color: 'var(--gold)' } },
          ranked[0] ? ranked[0].name : '-'
        ),
        React.createElement('div', { className: 'sub' },
          ranked[0] ? ranked[0].value.toLocaleString() + ' 千人' : ''
        )
      ),
      React.createElement('div', { className: 'stat-card' },
        React.createElement('div', { className: 'label' }, '男女比'),
        React.createElement('div', { style: { display: 'flex', gap: '16px', marginTop: '6px' } },
          React.createElement('div', null,
            React.createElement('div', { style: { fontSize: '22px', fontWeight: 900, fontFamily: "'Zen Kaku Gothic New', sans-serif", color: 'var(--bar-male)' } }, maleRatio + '%'),
            React.createElement('div', { style: { fontSize: '11px', color: 'var(--text-muted)' } }, '男性')
          ),
          React.createElement('div', null,
            React.createElement('div', { style: { fontSize: '22px', fontWeight: 900, fontFamily: "'Zen Kaku Gothic New', sans-serif", color: 'var(--bar-female)' } }, femaleRatio + '%'),
            React.createElement('div', { style: { fontSize: '11px', color: 'var(--text-muted)' } }, '女性')
          )
        )
      )
    ),

    // Ranking section
    React.createElement('div', { className: 'ranking-section' },
      React.createElement('div', { className: 'ranking-header' },
        React.createElement('h2', null, disease.n),
        React.createElement('div', { style: { display: 'flex', gap: '12px', alignItems: 'center' } },
          React.createElement('div', { className: 'search-wrap' },
            React.createElement('span', { className: 'search-icon' }, '🔍'),
            React.createElement('input', {
              type: 'text',
              placeholder: '都道府県を検索...',
              value: searchQuery,
              onChange: e => setSearchQuery(e.target.value),
              style: { width: '180px' }
            })
          ),
          React.createElement('div', { className: 'info' }, genderLabel + ' / 47都道府県')
        )
      ),
      React.createElement('div', { className: 'ranking-list' },
        filtered.map((item, idx) => {
          const actualRank = ranked.indexOf(item) + 1;
          const barWidth = maxValue > 0 ? (item.value / maxValue) * 100 : 0;

          return React.createElement('div', { className: 'rank-item', key: item.name },
            React.createElement('div', { className: 'rank-num' }, actualRank),
            React.createElement('div', { className: 'rank-info' },
              React.createElement('div', { className: 'rank-name' }, item.name),
              React.createElement('div', { className: 'rank-bar-wrap' },
                React.createElement('div', {
                  className: 'rank-bar',
                  style: { width: barWidth + '%' }
                })
              ),
              gender === 'total' && React.createElement('div', { className: 'gender-breakdown' },
                React.createElement('span', { className: 'male' }, '♂ ' + item.male.toLocaleString()),
                React.createElement('span', { className: 'female' }, '♀ ' + item.female.toLocaleString())
              )
            ),
            React.createElement('div', { className: 'rank-value' },
              item.value.toLocaleString(),
              React.createElement('span', { className: 'unit' }, ' 千人')
            )
          );
        })
      )
    ),

    // Footer
    React.createElement('div', { className: 'footer' },
      '出典：2022（令和4）年 国民生活基礎調査 第136表 ｜ 通院者数，都道府県・性・最も気になる傷病別'
    )
  );
}

ReactDOM.render(React.createElement(App), document.getElementById('app'));
</script>
</body>
</html>
